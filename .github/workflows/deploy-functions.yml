name: Deploy Supabase (migrations + functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: tbwmckmyzoxzhpqlomsp
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Require deployment secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Missing repo secret SUPABASE_ACCESS_TOKEN"; exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::Missing repo secret SUPABASE_DB_PASSWORD"; exit 1
          fi

      - uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3
        with:
          version: 2.81.3

      - name: Apply pending database migrations
        run: |
          supabase link --project-ref "$PROJECT_REF" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase db push --linked --include-all --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Update Anthropic secret when supplied
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            supabase secrets set ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" --project-ref "$PROJECT_REF"
          fi

      - name: Deploy every Edge Function
        run: |
          for fn in delete-account ai-coach paddle-webhook push-daily; do
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
          done

      - name: Verify migration history
        run: supabase migration list --linked --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
